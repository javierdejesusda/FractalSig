name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal CI dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch (no JAX, no CUDA — sufficient for smoke tests).
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          # iisignature's setup.py imports numpy at top-level, and pip's
          # default build isolation hides the outer env's numpy from the
          # build subprocess. Install numpy + setuptools/wheel into the
          # main env, then build iisignature with --no-build-isolation so
          # it sees them.
          pip install numpy==2.2.2 setuptools wheel
          pip install --no-build-isolation iisignature==0.24
          pip install \
            scipy==1.15.1 \
            pywavelets==1.9.0 \
            ptwt==1.0.1 \
            tqdm==4.67.1 \
            fbm==0.3.0 \
            hydra-core==1.3.2 \
            omegaconf==2.3.0 \
            pytest==8.3.4 \
            ruff==0.8.4 \
            mypy==1.13.0
          pip install -e . --no-deps

      - name: Lint with ruff
        run: ruff check fractalsig tests

      - name: Type check with mypy
        run: mypy fractalsig --ignore-missing-imports

      - name: Run smoke tests
        run: pytest tests/ -m smoke -v
